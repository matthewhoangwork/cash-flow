name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provide .env for asset bundling
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
